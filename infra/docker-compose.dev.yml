name: tikflow-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: tikflow-postgres
    restart: unless-stopped
    command:
      - 'postgres'
      - '-c'
      - 'shared_preload_libraries=pg_stat_statements'
      - '-c'
      - 'pg_stat_statements.track=all'
      - '-c'
      - 'max_connections=200'
    environment:
      POSTGRES_USER: tikflow
      POSTGRES_PASSWORD: tikflow
      POSTGRES_DB: tikflow
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tikflow -d tikflow']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tikflow-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: tikflow-mailhog
    restart: unless-stopped
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # Web UI

  minio:
    image: minio/minio:latest
    container_name: tikflow-minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: tikflow
      MINIO_ROOT_PASSWORD: tikflow-minio-dev
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # Console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: tikflow-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 tikflow tikflow-minio-dev &&
      mc mb -p local/tikflow-uploads || true &&
      mc mb -p local/tikflow-receipts || true &&
      mc mb -p local/tikflow-kyc || true &&
      mc anonymous set download local/tikflow-receipts || true
      "
    restart: 'no'

  clamav:
    image: clamav/clamav:stable
    container_name: tikflow-clamav
    restart: unless-stopped
    ports:
      - '3310:3310'
    volumes:
      - clamav-data:/var/lib/clamav
    healthcheck:
      test: ['CMD-SHELL', 'echo PING | nc -w 2 localhost 3310 || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  postgres-data:
  redis-data:
  minio-data:
  clamav-data:
