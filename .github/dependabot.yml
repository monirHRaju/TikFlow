version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '03:00'
    open-pull-requests-limit: 10
    versioning-strategy: increase
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      types:
        patterns:
          - '@types/*'
      eslint:
        patterns:
          - 'eslint*'
          - '@typescript-eslint/*'
          - 'typescript-eslint'
      prisma:
        patterns:
          - 'prisma'
          - '@prisma/*'
      next:
        patterns:
          - 'next'
          - 'next-*'
          - 'eslint-config-next'
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
      tailwind:
        patterns:
          - 'tailwindcss'
          - '@tailwindcss/*'
      vitest:
        patterns:
          - 'vitest'
          - '@vitest/*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '03:00'
    commit-message:
      prefix: chore(ci)
      include: scope

  - package-ecosystem: docker
    directory: /infra
    schedule:
      interval: weekly
      day: monday
      time: '03:00'
    commit-message:
      prefix: chore(infra)
      include: scope
