name: Setup TikFlow toolchain
description: Install Node 22, pnpm 9.12.3, dependencies, and generate the Prisma client.

inputs:
  generate-prisma:
    description: Run `pnpm db:generate` after install so type-aware tasks work.
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9.12.3
        run_install: false

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Generate Prisma client
      if: inputs.generate-prisma == 'true'
      shell: bash
      run: pnpm --filter @tikflow/db db:generate
