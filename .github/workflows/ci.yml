name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: '1'
  NEXT_TELEMETRY_DISABLED: '1'
  HUSKY: '0'
  # Required by apps/api env.ts so typecheck/build don't choke on missing env.
  DATABASE_URL: postgres://tikflow_app:tikflow_app@localhost:5432/tikflow?schema=public
  DATABASE_MIGRATE_URL: postgres://tikflow:tikflow@localhost:5432/tikflow?schema=public
  REDIS_URL: redis://localhost:6379
  AUTH_SECRET: ci-placeholder-secret-not-used-for-anything-real-32b
  AUTH_URL: http://localhost:3000

jobs:
  quality:
    name: Lint • Typecheck • Format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Prettier (format check)
        run: pnpm format:check

      - name: ESLint (root)
        run: pnpm lint:root

      - name: ESLint (workspaces)
        run: pnpm lint

      - name: TypeScript
        run: pnpm typecheck

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Vitest (unit)
        run: pnpm test

  integration:
    name: Integration tests (RLS, testcontainers)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Pre-pull Postgres image (warm Docker cache)
        run: docker pull postgres:16-alpine

      - name: RLS integration test
        run: pnpm --filter @tikflow/db test:integration

  prisma-migrate-check:
    name: Prisma migrations apply cleanly
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tikflow
          POSTGRES_PASSWORD: tikflow
          POSTGRES_DB: tikflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U tikflow -d tikflow"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Provision extensions and roles
        env:
          PGPASSWORD: tikflow
        run: |
          for f in infra/postgres/init/*.sql; do
            echo "Applying $f"
            psql -h localhost -U tikflow -d tikflow -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Apply migrations
        env:
          DATABASE_URL: postgres://tikflow:tikflow@localhost:5432/tikflow?schema=public
        run: pnpm --filter @tikflow/db exec prisma migrate deploy

      - name: Detect drift between schema and migrations
        env:
          DATABASE_URL: postgres://tikflow:tikflow@localhost:5432/tikflow?schema=public
        run: pnpm --filter @tikflow/db exec prisma migrate diff --from-schema-datamodel prisma/schema.prisma --to-url "$DATABASE_URL" --exit-code

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Turbo build
        run: pnpm build

  audit:
    name: pnpm audit (high+)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          generate-prisma: 'false'

      - name: pnpm audit
        run: pnpm audit --prod --audit-level=high
